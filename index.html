<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Támogasd a Bezergő Egyesületet 💚</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;
      color: #2d3436;
      background-image: url("https://images.unsplash.com/photo-1490750967868-88aa4486c946");
      background-size: cover;
      background-position: center;
    }

    .overlay {
      background: rgba(255,255,255,0.85);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      max-width: 95%;
      width: 420px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      box-sizing: border-box;
    }

    .logo {
      max-width: 100px;
      height: auto;
      margin-bottom: 10px;
    }

    h1 {
      margin: 10px 0;
      font-size: 1.6em;
    }

    .label {
      font-size: 13px;
      opacity: 0.7;
      margin-top: 12px;
    }

    .value {
      font-size: 16px;
      font-weight: bold;
      margin-top: 5px;
      word-break: break-word;
    }

    .notice {
      background: #ffeaa7;
      padding: 12px;
      border-radius: 12px;
      margin: 15px 0;
      font-weight: bold;
      font-size: 14px;
    }

    .hint {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 10px;
      margin-bottom: 5px;
    }

    button {
      background: #00b894;
      border: none;
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      margin: 5px 3px;
      width: 30%;
      min-width: 80px;
    }

    button:hover {
      background: #019875;
    }

    .qr {
      margin-top: 15px;
    }

    .qr img {
      width: 150px;
      max-width: 40vw;
      border-radius: 12px;
    }

    .thanks {
      margin-top: 15px;
      font-size: 13px;
      opacity: 0.8;
    }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #2d3436;
      color: white;
      padding: 12px 20px;
      border-radius: 25px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
      z-index: 9999;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Mobilra kisebb címek és gombok */
    @media (max-width: 400px) {
      h1 { font-size: 1.4em; }
      button { font-size: 13px; padding: 8px 12px; }
      .notice { font-size: 13px; padding: 10px; }
      .value { font-size: 15px; }
    }
  </style>
</head>

<body>
  <div class="overlay">
    <div class="card">
      <img src="logo.png" alt="Bezergő Egyesület logó" class="logo">

      <h1>🌱 Támogass minket!</h1>
      <p>Tegyünk együtt egy virágosabb Bezerédért 🌼</p>

      <div class="label">Kedvezményezett</div>
      <div class="value" id="name">Bezergő Egyesület</div>

      <div class="label">Számlaszám</div>
      <div class="value" id="accountNumber">11600006-00000002-05047439</div>

      <div class="notice">
        🌼 Közlemény:<br>
        <strong id="message">virágosítás</strong>
      </div>

      <div class="hint">📋 Koppints a gyors másoláshoz</div>

      <div>
        <button onclick="copyText('name')">Név</button>
        <button onclick="copyText('accountNumber')">Számlaszám</button>
        <button onclick="copyText('message')">Közlemény</button>
      </div>

      <div class="thanks">💚 Minden támogatás egy új virág!</div>
    </div>
  </div>
  <div id="toast">✔ Kimásolva 🌼</div>

  <script>
    function copyText(id) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => showToast());
    }

    function showToast() {
      const toast = document.getElementById("toast");
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2000);
    }
  </script>
</body>
</html>
